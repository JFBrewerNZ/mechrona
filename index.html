<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MECHRONA // COMMAND TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --amber: #d4a017;
  --amber-dim: #8a6b10;
  --amber-bright: #ffd700;
  --bg: #0a0a08;
  --bg-panel: #111110;
  --bg-input: #0d0d0b;
  --border: #2a2a1a;
  --red: #ff4444;
  --green: #44ff44;
  --blue: #4488ff;
  --text: #c8b040;
  --text-dim: #6a5a20;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'VT323', monospace; font-size: 16px; overflow: hidden; }

/* Scanlines */
body::after {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none; z-index: 9999;
}
/* Vignette */
body::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  pointer-events: none; z-index: 9998;
}

/* Login */
#login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; }
#login-screen h1 { font-size: 32px; color: var(--amber); text-shadow: 0 0 10px var(--amber-dim); letter-spacing: 6px; }
#login-screen .subtitle { color: var(--text-dim); font-size: 18px; letter-spacing: 3px; }
#login-screen input { background: var(--bg-input); border: 1px solid var(--border); color: var(--amber); font-family: 'VT323', monospace; font-size: 18px; padding: 10px 16px; width: 280px; outline: none; }
#login-screen input:focus { border-color: var(--amber-dim); }
#login-screen button { background: transparent; border: 1px solid var(--amber-dim); color: var(--amber); font-family: 'VT323', monospace; font-size: 18px; padding: 10px 32px; cursor: pointer; letter-spacing: 2px; }
#login-screen button:hover { background: var(--amber-dim); color: var(--bg); }
#login-error { color: var(--red); font-size: 16px; min-height: 20px; }

/* App shell */
#app { display: none; flex-direction: column; height: 100%; }
#header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--bg-panel); flex-shrink: 0; }
#header h1 { font-size: 20px; color: var(--amber); letter-spacing: 4px; }
#header .user-info { color: var(--text-dim); font-size: 14px; }
#logout-btn { background: none; border: 1px solid var(--red); color: var(--red); font-family: 'VT323', monospace; font-size: 14px; padding: 4px 12px; cursor: pointer; }

/* Tabs */
#tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-panel); flex-shrink: 0; }
.tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: var(--text-dim); letter-spacing: 2px; font-size: 16px; border-bottom: 2px solid transparent; }
.tab.active { color: var(--amber); border-bottom-color: var(--amber); }
.tab:hover { color: var(--amber-bright); }

/* Content */
#content { flex: 1; overflow: auto; position: relative; }
.panel { display: none; height: 100%; }
.panel.active { display: flex; flex-direction: column; }

/* POI Panel */
#poi-panel { flex-direction: column; }
#map { flex: 1; min-height: 300px; }
#poi-form-container { max-height: 50%; overflow-y: auto; border-top: 1px solid var(--border); padding: 12px; background: var(--bg-panel); }

/* Form styles */
.form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.form-row label { width: 100%; color: var(--text-dim); font-size: 14px; margin-bottom: 2px; }
.form-field { flex: 1; min-width: 120px; }
.form-field label { display: block; color: var(--text-dim); font-size: 13px; margin-bottom: 2px; }
input, select, textarea { background: var(--bg-input); border: 1px solid var(--border); color: var(--amber); font-family: 'VT323', monospace; font-size: 16px; padding: 6px 8px; width: 100%; outline: none; }
input:focus, select:focus, textarea:focus { border-color: var(--amber-dim); }
select { cursor: pointer; }
textarea { resize: vertical; min-height: 40px; }
.btn { background: transparent; border: 1px solid var(--amber-dim); color: var(--amber); font-family: 'VT323', monospace; font-size: 16px; padding: 8px 16px; cursor: pointer; letter-spacing: 1px; }
.btn:hover { background: var(--amber-dim); color: var(--bg); }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red); color: var(--bg); }
.btn-success { border-color: var(--green); color: var(--green); }
.btn-success:hover { background: var(--green); color: var(--bg); }
.btn-sm { padding: 4px 10px; font-size: 14px; }
.btn-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

/* Users Panel */
#users-panel { padding: 12px; overflow-y: auto; }
.user-card { border: 1px solid var(--border); padding: 12px; margin-bottom: 8px; background: var(--bg-panel); }
.user-card.banned { border-color: var(--red); }
.user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.user-name { color: var(--amber); font-size: 18px; }
.user-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 4px; font-size: 14px; color: var(--text-dim); }
.user-stats span { }
.user-stats .val { color: var(--amber); }
.ban-badge { color: var(--red); font-size: 14px; }
.admin-badge { color: var(--green); font-size: 14px; }

/* Toast */
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg-panel); border: 1px solid var(--amber-dim); color: var(--amber); padding: 8px 20px; font-family: 'VT323', monospace; z-index: 10000; display: none; }

/* Leaflet overrides */
.leaflet-container { background: var(--bg) !important; }
.leaflet-control-zoom a { background: var(--bg-panel) !important; color: var(--amber) !important; border-color: var(--border) !important; }
.leaflet-popup-content-wrapper { background: var(--bg-panel); color: var(--text); border: 1px solid var(--amber-dim); border-radius: 2px; }
.leaflet-popup-tip { background: var(--bg-panel); }

/* Mobile friendly */
@media (max-width: 600px) {
  #poi-form-container { max-height: 60%; }
  .form-row { flex-direction: column; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>MECHRONA</h1>
  <div class="subtitle">COMMAND TERMINAL v1.0</div>
  <div style="height:24px"></div>
  <button onclick="doLogin()" style="display:flex;align-items:center;gap:10px;padding:12px 28px;">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    SIGN IN WITH GOOGLE
  </button>
  <div id="login-error"></div>
</div>

<!-- APP -->
<div id="app">
  <div id="header">
    <h1>MECHRONA CMD</h1>
    <span class="user-info" id="user-email"></span>
    <button id="logout-btn" onclick="doLogout()">LOGOUT</button>
  </div>
  <div id="tabs">
    <div class="tab active" data-tab="poi" onclick="switchTab('poi')">◆ POI MAP</div>
    <div class="tab" data-tab="users" onclick="switchTab('users')">◆ USERS</div>
  </div>
  <div id="content">
    <!-- POI PANEL -->
    <div id="poi-panel" class="panel active">
      <div id="map"></div>
      <div id="poi-form-container" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span id="poi-form-title" style="color:var(--amber);font-size:18px;letter-spacing:2px">NEW POI</span>
          <button class="btn btn-sm" onclick="closePoiForm()">✕ CLOSE</button>
        </div>
        <div class="form-row">
          <div class="form-field"><label>NAME</label><input id="poi-name" placeholder="Iron Foundry"></div>
          <div class="form-field"><label>TYPE</label>
            <select id="poi-type">
              <option value="gym">Mech Gym</option>
              <option value="salvageYard">Salvage Yard</option>
              <option value="anomaly">Energy Anomaly</option>
              <option value="depot">Supply Depot</option>
              <option value="relay">Comm Relay</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field"><label>RARITY</label>
            <select id="poi-rarity">
              <option value="common">Common</option>
              <option value="uncommon">Uncommon</option>
              <option value="rare">Rare</option>
              <option value="epic">Epic</option>
              <option value="legendary">Legendary</option>
            </select>
          </div>
          <div class="form-field"><label>LAT, LNG</label><input id="poi-latlng" readonly></div>
        </div>
        <div class="form-row">
          <div class="form-field" style="flex:2"><label>DESCRIPTION</label><textarea id="poi-desc" rows="2" placeholder="Flavor text..."></textarea></div>
        </div>
        <div class="form-row">
          <div class="form-field" style="flex:2"><label>BACKGROUND IMAGE URL</label><input id="poi-img" placeholder="https://..."></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-success" id="poi-save-btn" onclick="savePoi()">SAVE</button>
          <button class="btn btn-danger" id="poi-delete-btn" onclick="deletePoi()" style="display:none">DELETE</button>
          <button class="btn" id="poi-toggle-btn" onclick="togglePoiActive()" style="display:none">TOGGLE ACTIVE</button>
        </div>
      </div>
    </div>
    <!-- USERS PANEL -->
    <div id="users-panel" class="panel">
      <div id="users-list"><span style="color:var(--text-dim)">Loading users...</span></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://ywozktsmimfqbqzflmsh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3b3prdHNtaW1mcWJxemZsbXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MDgyMzcsImV4cCI6MjA4NzM4NDIzN30.-PhtdX_b7eqRQKIWKfOsmvFZaetVx7F60n4jlaimq20';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let map, markers = [], editingPoi = null, allPois = [];

const TYPE_COLORS = { gym:'#ff4444', salvageYard:'#44ff44', anomaly:'#4488ff', depot:'#d4a017', relay:'#cc44ff' };
const TYPE_ICONS = { gym:'⚔', salvageYard:'♻', anomaly:'⚡', depot:'📦', relay:'📡' };
const RARITY_COLORS = { common:'#888', uncommon:'#44ff44', rare:'#4488ff', epic:'#cc44ff', legendary:'#ffd700' };

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

// AUTH
async function doLogin() {
  const err = document.getElementById('login-error');
  err.textContent = '';
  const { data, error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href.split('?')[0].split('#')[0] }
  });
  if (error) { err.textContent = error.message; }
}

async function checkAdmin(user) {
  // Use RPC function to bypass RLS
  const { data: isAdmin, error } = await sb.rpc('is_admin', { check_user_id: user.id });
  if (error || !isAdmin) {
    document.getElementById('login-error').textContent = 'ACCESS DENIED: NOT AN ADMIN';
    await sb.auth.signOut();
    return;
  }
  showApp(user);
}

let appLoaded = false;
function showApp(user) {
  if (appLoaded) return;
  appLoaded = true;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-email').textContent = user.email;
  initMap();
  loadPois();
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

// Check existing session + handle OAuth redirect
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    await checkAdmin(session.user);
  }
});
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await checkAdmin(session.user);
})();

// TABS
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab === 'poi' ? 'poi-panel' : 'users-panel').classList.add('active');
  if (tab === 'poi') { setTimeout(() => map && map.invalidateSize(), 100); }
  if (tab === 'users') loadUsers();
}

// MAP
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([-36.8485, 174.7633], 14);
  L.tileLayer('https://basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}@2x.png', {
    maxZoom: 19,
    attribution: '© CartoDB'
  }).addTo(map);
  map.on('click', (e) => openPoiForm(null, e.latlng));
  setTimeout(() => map.invalidateSize(), 200);
}

function makeIcon(type, rarity) {
  const color = TYPE_COLORS[type] || '#d4a017';
  const border = RARITY_COLORS[rarity] || '#888';
  return L.divIcon({
    className: '',
    html: `<div style="width:32px;height:32px;border-radius:50%;background:${color}22;border:2px solid ${color};display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 8px ${color}88, 0 0 2px ${border};">${TYPE_ICONS[type]||'?'}</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });
}

async function loadPois() {
  // Fetch all POIs (admin can see inactive via RLS)
  const { data, error } = await sb.from('pois').select('*');
  if (error) { toast('Error loading POIs: ' + error.message); return; }
  allPois = data || [];
  renderMarkers();
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  allPois.forEach(poi => {
    const m = L.marker([poi.latitude, poi.longitude], { icon: makeIcon(poi.type, poi.rarity) });
    m.on('click', () => openPoiForm(poi));
    if (!poi.active) m.setOpacity(0.4);
    m.bindTooltip(`${poi.name} [${poi.rarity}]`, { className: 'leaflet-tooltip', direction: 'top' });
    m.addTo(map);
    markers.push(m);
  });
}

// POI FORM
function openPoiForm(poi, latlng) {
  editingPoi = poi;
  const fc = document.getElementById('poi-form-container');
  fc.style.display = 'block';
  document.getElementById('poi-form-title').textContent = poi ? 'EDIT POI' : 'NEW POI';
  document.getElementById('poi-name').value = poi ? poi.name : '';
  document.getElementById('poi-type').value = poi ? poi.type : 'gym';
  document.getElementById('poi-rarity').value = poi ? poi.rarity : 'common';
  document.getElementById('poi-desc').value = poi ? (poi.description || '') : '';
  document.getElementById('poi-img').value = poi ? (poi.background_image_url || '') : '';
  const ll = poi ? { lat: poi.latitude, lng: poi.longitude } : latlng;
  document.getElementById('poi-latlng').value = `${ll.lat.toFixed(6)}, ${ll.lng.toFixed(6)}`;
  document.getElementById('poi-delete-btn').style.display = poi ? 'inline-block' : 'none';
  document.getElementById('poi-toggle-btn').style.display = poi ? 'inline-block' : 'none';
  if (poi) document.getElementById('poi-toggle-btn').textContent = poi.active ? 'DEACTIVATE' : 'ACTIVATE';
}

function closePoiForm() {
  document.getElementById('poi-form-container').style.display = 'none';
  editingPoi = null;
}

async function savePoi() {
  const [lat, lng] = document.getElementById('poi-latlng').value.split(',').map(Number);
  const data = {
    name: document.getElementById('poi-name').value,
    type: document.getElementById('poi-type').value,
    rarity: document.getElementById('poi-rarity').value,
    latitude: lat, longitude: lng,
    description: document.getElementById('poi-desc').value || null,
    background_image_url: document.getElementById('poi-img').value || null,
  };
  if (!data.name) { toast('Name required'); return; }
  let error;
  if (editingPoi) {
    ({ error } = await sb.from('pois').update(data).eq('id', editingPoi.id));
  } else {
    ({ error } = await sb.from('pois').insert(data));
  }
  if (error) { toast('Error: ' + error.message); return; }
  toast(editingPoi ? 'POI UPDATED' : 'POI CREATED');
  closePoiForm();
  await loadPois();
}

async function deletePoi() {
  if (!editingPoi || !confirm('Delete this POI?')) return;
  const { error } = await sb.from('pois').delete().eq('id', editingPoi.id);
  if (error) { toast('Error: ' + error.message); return; }
  toast('POI DELETED');
  closePoiForm();
  await loadPois();
}

async function togglePoiActive() {
  if (!editingPoi) return;
  const { error } = await sb.from('pois').update({ active: !editingPoi.active }).eq('id', editingPoi.id);
  if (error) { toast('Error: ' + error.message); return; }
  toast(editingPoi.active ? 'POI DEACTIVATED' : 'POI ACTIVATED');
  closePoiForm();
  await loadPois();
}

// USERS
async function loadUsers() {
  const { data, error } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
  if (error) { document.getElementById('users-list').innerHTML = `<span style="color:var(--red)">Error: ${error.message}</span>`; return; }
  const container = document.getElementById('users-list');
  if (!data || data.length === 0) { container.innerHTML = '<span style="color:var(--text-dim)">No users found.</span>'; return; }
  container.innerHTML = data.map(u => `
    <div class="user-card ${u.is_banned ? 'banned' : ''}" id="uc-${u.id}">
      <div class="user-header">
        <span class="user-name">${esc(u.display_name || 'Unknown')}</span>
        <span>
          ${u.is_admin ? '<span class="admin-badge">[ADMIN]</span> ' : ''}
          ${u.is_banned ? '<span class="ban-badge">[BANNED: ' + esc(u.ban_reason || 'No reason') + ']</span>' : ''}
        </span>
      </div>
      <div class="user-stats">
        <span>Credits: <span class="val">${u.credits}</span></span>
        <span>AI Chip: <span class="val">Lv${u.ai_chip_level}</span></span>
        <span>Scans: <span class="val">${u.total_scans}</span></span>
        <span>Combats: <span class="val">${u.total_combats}</span></span>
        <span>Wins: <span class="val">${u.total_wins}</span></span>
      </div>
      <div class="btn-row">
        <button class="btn btn-sm" onclick="editCredits('${u.id}', ${u.credits})">EDIT CREDITS</button>
        <button class="btn btn-sm ${u.is_banned ? 'btn-success' : 'btn-danger'}" onclick="toggleBan('${u.id}', ${u.is_banned})">${u.is_banned ? 'UNBAN' : 'BAN'}</button>
      </div>
    </div>
  `).join('');
}

async function editCredits(id, current) {
  const val = prompt(`Current credits: ${current}\nEnter new credit amount:`, current);
  if (val === null) return;
  const num = parseInt(val);
  if (isNaN(num)) { toast('Invalid number'); return; }
  const { error } = await sb.from('profiles').update({ credits: num }).eq('id', id);
  if (error) { toast('Error: ' + error.message); return; }
  toast('Credits updated to ' + num);
  loadUsers();
}

async function toggleBan(id, isBanned) {
  let reason = null;
  if (!isBanned) {
    reason = prompt('Ban reason:');
    if (reason === null) return;
  }
  const update = isBanned ? { is_banned: false, ban_reason: null } : { is_banned: true, ban_reason: reason };
  const { error } = await sb.from('profiles').update(update).eq('id', id);
  if (error) { toast('Error: ' + error.message); return; }
  toast(isBanned ? 'User unbanned' : 'User banned');
  loadUsers();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
